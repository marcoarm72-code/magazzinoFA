<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magazzino FA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #e9ecef; padding: 15px; font-family: sans-serif; }
        #reader { width: 100%; max-width: 450px; margin: 0 auto 20px; border: 2px solid #007bff; border-radius: 10px; background: white; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container text-center">
    <h2 class="mb-4">📦 Magazzino FA</h2>

    <div class="btn-group w-100 mb-4">
        <button class="btn btn-primary" onclick="cambiaSchermata('carico')">Carico Merci</button>
        <button class="btn btn-info text-white" onclick="cambiaSchermata('prezzi')">Leggi Prezzi</button>
    </div>

    <div id="reader"></div>

    <div id="box-carico" class="card p-4 text-start">
        <h4>Nuovo Articolo / Aggiorna</h4>
        <label>Codice a Barre:</label>
        <input type="text" id="inp-barcode" class="form-control mb-2">
        <label>Nome:</label>
        <input type="text" id="inp-nome" class="form-control mb-2">
        <label>Prezzo Acquisto:</label>
        <input type="number" id="inp-acquisto" class="form-control mb-2" step="0.01">
        <label>Prezzo Listino:</label>
        <input type="number" id="inp-listino" class="form-control mb-2" step="0.01">
        <label>Prezzo Vendita:</label>
        <input type="number" id="inp-vendita" class="form-control mb-2" step="0.01">
        <label>Giacenza (Quantità):</label>
        <input type="number" id="inp-qta" class="form-control mb-3">
        <button class="btn btn-success w-100 py-2" onclick="salva()">SALVA NEL DATABASE</button>
    </div>

    <div id="box-prezzi" class="card p-4 hidden">
        <h4>Ricerca Prezzi</h4>
        <div id="res-ricerca" class="alert alert-warning mt-2">Scansiona un prodotto...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // --- QUI SOTTO HO GIÀ INSERITO I TUOI DATI ---
    const firebaseConfig = {
        apiKey: "AIzaSyDU1g5RaXCtlyo5-No57a_yUiIS_iGz6Dw",
        authDomain: "magazzinofa.firebaseapp.com",
        projectId: "magazzinofa",
        storageBucket: "magazzinofa.firebasestorage.app",
        messagingSenderId: "551510096197",
        appId: "1:551510096197:web:d0b05070e30cd88f81662c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let modo = 'carico';

    window.cambiaSchermata = (m) => {
        modo = m;
        document.getElementById('box-carico').classList.toggle('hidden', m !== 'carico');
        document.getElementById('box-prezzi').classList.toggle('hidden', m !== 'prezzi');
    };

    const scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (txt) => {
        document.getElementById('inp-barcode').value = txt;
        const snap = await getDoc(doc(db, "prodotti", txt));
        if (snap.exists()) {
            const p = snap.data();
            if (modo === 'carico') {
                document.getElementById('inp-nome').value = p.nome;
                document.getElementById('inp-acquisto').value = p.prezzo_acquisto;
                document.getElementById('inp-listino').value = p.prezzo_listino;
                document.getElementById('inp-vendita').value = p.prezzo_vendita;
                document.getElementById('inp-qta').value = p.quantita;
            } else {
                document.getElementById('res-ricerca').innerHTML = `
                    <h3>${p.nome}</h3>
                    <p>Vendita: <b>${p.prezzo_vendita}€</b></p>
                    <p>Listino: ${p.prezzo_listino}€</p>
                    <p>Giacenza: ${p.quantita}</p>
                `;
            }
        }
    });

    window.salva = async () => {
        const bc = document.getElementById('inp-barcode').value;
        if(!bc) return alert("Codice mancante!");
        try {
            await setDoc(doc(db, "prodotti", bc), {
                nome: document.getElementById('inp-nome').value,
                prezzo_acquisto: document.getElementById('inp-acquisto').value,
                prezzo_listino: document.getElementById('inp-listino').value,
                prezzo_vendita: document.getElementById('inp-vendita').value,
                quantita: document.getElementById('inp-qta').value
            });
            alert("Articolo salvato con successo!");
        } catch(e) { alert("Errore: " + e.message); }
    };
</script>
</body>
</html>
